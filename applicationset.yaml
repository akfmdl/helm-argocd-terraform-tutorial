apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kjm-nginx
spec:
  generators:
    - git:
        repoURL: https://github.com/akfmdl/helm-argocd-terraform-tutorial.git
        revision: kjm
        directories:
          - path: charts/example
  template:
    metadata:
      name: kjm-nginx
    spec:
      project: default
      source:
        repoURL: https://github.com/akfmdl/helm-argocd-terraform-tutorial.git
        targetRevision: kjm
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: kjm
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
